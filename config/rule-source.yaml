  AirPort4-魔戒: {<<: *BaseProvider, url: '订阅地址', override: {additional-prefix: '[备] '}}
  # 自建订阅源 - 自建节点集合，使用时请修改
  AirPort5-REshare: {<<: *BaseProvider, url: '订阅地址', override: {additional-prefix: '[自] '}}
  AirPort6-Oracle: {<<: *BaseProvider, url: '订阅地址', override: {additional-prefix: '[自] '}}

