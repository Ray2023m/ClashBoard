SelectRJ: &SelectRJ {type: select, proxies: [REJECT,香港故转, 台湾故转, 日本故转, 狮城故转]}

# ==================== 代理提供商 ====================
proxy-providers:
  # 优质订阅源 - 优质节点集合，使用时请修改
  AirPort1-猫猫云: {<<: *BaseProvider, url: '订阅地址', override: {additional-prefix: '[优] '}}
  AirPort2-Candytally: {<<: *BaseProvider, url: '订阅地址', override: {additional-prefix: '[优] '}}
  # 备用订阅源 - 次优节点集合，使用时请修改
